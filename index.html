<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Place Finder</title>
    <link rel="stylesheet" href="main.css?v=41">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <button id="lang-toggle" class="icon-btn">🇺🇸 / 🇮🇱</button>
                <button id="admin-login-btn" class="text-btn" data-i18n="admin_login">Admin Login</button>
            </div>
            <h1 data-i18n="app_title">Red Alert Safe Zone</h1>
            <p data-i18n="app_subtitle">Find the nearest secure place immediately.</p>
        </header>

        <main>
            <div class="action-buttons">
                <button id="guide-btn" class="primary-btn">
                    <span class="icon">🛡️</span>
                    <span data-i18n="guide_btn">Guide me to closest shelter</span>
                </button>
                <button id="view-map-btn" class="secondary-btn" style="margin-top: 10px;">
                    <span class="icon">🗺️</span>
                    <span data-i18n="view_map_btn">View All Shelters on Map</span>
                </button>
                <button id="admin-panel-btn" class="secondary-btn" style="margin-top: 10px; display: none; background-color: #333;">
                    <span class="icon">⚙️</span>
                    <span data-i18n="manage_shelters_btn">Manage Shelters (Admin)</span>
                </button>
            </div>

            <div id="status-message" class="status"></div>

            <!-- Map Modal/Container -->
            <div id="map-modal" class="map-modal" style="display: none;">
                <div class="map-content">
                    <button id="close-map-btn" class="close-btn">&times;</button>
                    <div id="map"></div>
                </div>
            </div>

            <!-- Nearest Shelter Modal -->
            <div id="nearest-shelter-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span id="close-nearest-btn" class="close-modal">&times;</span>
                    <h3 data-i18n="nearest_shelter_title">Nearest Shelter Found</h3>
                    
                    <div class="shelter-details">
                        <p><strong><span data-i18n="shelter_type_label">Shelter Type:</span></strong> <span id="nearest-type"></span></p>
                        <p id="nearest-floors-container" style="display:none;"><strong><span data-i18n="floors_label">Floors Underground:</span></strong> <span id="nearest-floors"></span></p>
                        <p><strong><span data-i18n="distance_label">Distance:</span></strong> <span id="nearest-distance"></span></p>
                        <p><strong><span data-i18n="description_label">Description:</span></strong></p>
                        <p id="nearest-description" style="background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 5px;"></p>
                    </div>

                    <button id="navigate-btn" class="primary-btn" style="width: 100%;">
                        <span class="icon">🏃</span>
                        <span data-i18n="navigate_btn">Navigate Now</span>
                    </button>
                </div>
            </div>

            <!-- Admin Login Modal -->
            <div id="login-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span id="close-login-btn" class="close-modal">&times;</span>
                    <h3 data-i18n="admin_login_title">Admin Login</h3>
                    <input type="password" id="admin-password" placeholder="Enter Password" data-i18n-placeholder="password_placeholder">
                    <button id="submit-login-btn" class="primary-btn" style="margin-top: 10px;" data-i18n="login_btn">Login</button>
                </div>
            </div>

            <!-- Admin Panel Modal -->
            <div id="admin-panel-modal" class="modal" style="display: none;">
                <div class="modal-content full-height">
                    <span id="close-admin-panel-btn" class="close-modal">&times;</span>
                    <h3 data-i18n="manage_shelters_title">Manage Shelters</h3>
                    <div id="admin-shelter-list" class="shelter-list"></div>
                </div>
            </div>

            <!-- Edit Shelter Modal -->
            <div id="edit-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span id="close-edit-btn" class="close-modal">&times;</span>
                    <h3 data-i18n="edit_shelter_title">Edit Shelter</h3>
                    <button id="edit-view-map-btn" class="secondary-btn" style="margin-bottom: 15px; background-color: #4CAF50;" data-i18n="view_location_map">View Location on Map</button>
                    <input type="hidden" id="edit-shelter-id">
                    <div class="form-group">
                        <label for="edit-shelter-type" data-i18n="shelter_type_label">Shelter Type:</label>
                        <select id="edit-shelter-type">
                            <option value="public_shelter" data-i18n="type_public">Public Shelter</option>
                            <option value="building_shelter" data-i18n="type_building">Building Shelter</option>
                            <option value="portable_shelter" data-i18n="type_portable" id="edit-option-portable">Portable Shelter</option>
                            <option value="underground_parking" data-i18n="type_parking">Underground Parking Lot</option>
                        </select>
                    </div>
                    <div class="form-group" id="edit-floors-group" style="display: none;">
                        <label for="edit-floors" data-i18n="floors_label">Floors Underground:</label>
                        <input type="number" id="edit-floors" min="1">
                    </div>
                    <div class="form-group">
                        <label for="edit-description" data-i18n="description_label">Description (Optional):</label>
                        <textarea id="edit-description" maxlength="1000" rows="3" placeholder="Enter description..." data-i18n-placeholder="description_placeholder"></textarea>
                    </div>
                    <button id="save-edit-btn" class="primary-btn" data-i18n="update_shelter_btn">Update Shelter</button>
                </div>
            </div>

            <div class="stats">
                <p><strong data-i18n="total_shelters">Total Shelters in Database:</strong> <strong><span id="shelter-count">0</span></strong></p>
            </div>

            <div class="add-shelter-section">
                <a href="report.html" class="secondary-btn" style="background-color: #d32f2f; display: block; text-align: center; text-decoration: none;">
                    📍 <span data-i18n="nav_report_btn">Report a new Shelter</span>
                </a>
            </div>
            
            <footer style="margin-top: 30px; color: #999; font-size: 0.8rem;">
                <p>Version 41.0</p>
            </footer>
        </main>
    </div>
    <script src="app.v41.js"></script>
</body>
</html>

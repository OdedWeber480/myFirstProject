<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Place Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Red Alert Safe Zone</h1>
            <p>Find the nearest secure place immediately.</p>
            <button id="admin-login-btn" class="text-btn">Admin Login</button>
        </header>

        <main>
            <div class="action-buttons">
                <button id="guide-btn" class="primary-btn">
                    <span class="icon">🛡️</span>
                    Guide me to closest shelter
                </button>
                <button id="view-map-btn" class="secondary-btn" style="margin-top: 10px;">
                    <span class="icon">🗺️</span>
                    View All Shelters on Map
                </button>
                <button id="admin-panel-btn" class="secondary-btn" style="margin-top: 10px; display: none; background-color: #333;">
                    <span class="icon">⚙️</span>
                    Manage Shelters (Admin)
                </button>
            </div>

            <div id="status-message" class="status"></div>

            <!-- Map Modal/Container -->
            <div id="map-modal" class="map-modal" style="display: none;">
                <div class="map-content">
                    <button id="close-map-btn" class="close-btn">&times;</button>
                    <div id="map"></div>
                </div>
            </div>

            <!-- Admin Login Modal -->
            <div id="login-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span id="close-login-btn" class="close-modal">&times;</span>
                    <h3>Admin Login</h3>
                    <input type="password" id="admin-password" placeholder="Enter Password">
                    <button id="submit-login-btn" class="primary-btn" style="margin-top: 10px;">Login</button>
                </div>
            </div>

            <!-- Admin Panel Modal -->
            <div id="admin-panel-modal" class="modal" style="display: none;">
                <div class="modal-content full-height">
                    <span id="close-admin-panel-btn" class="close-modal">&times;</span>
                    <h3>Manage Shelters</h3>
                    <div id="admin-shelter-list" class="shelter-list"></div>
                </div>
            </div>

            <!-- Edit Shelter Modal -->
            <div id="edit-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span id="close-edit-btn" class="close-modal">&times;</span>
                    <h3>Edit Shelter</h3>
                    <button id="edit-view-map-btn" class="secondary-btn" style="margin-bottom: 15px; background-color: #4CAF50;">View Location on Map</button>
                    <input type="hidden" id="edit-shelter-id">
                    <div class="form-group">
                        <label for="edit-shelter-type">Shelter Type:</label>
                        <select id="edit-shelter-type">
                            <option value="public_shelter">Public Shelter</option>
                            <option value="building_shelter">Building Shelter</option>
                            <option value="underground_parking">Underground Parking Lot</option>
                        </select>
                    </div>
                    <div class="form-group" id="edit-floors-group" style="display: none;">
                        <label for="edit-floors">Floors Underground:</label>
                        <input type="number" id="edit-floors" min="1">
                    </div>
                    <button id="save-edit-btn" class="primary-btn">Update Shelter</button>
                </div>
            </div>

            <div class="stats">
                <p><strong>Total Shelters in Database: <span id="shelter-count">0</span></strong></p>
            </div>

            <div class="add-shelter-section">
                <h3>Report a New Shelter</h3>
                <form id="add-shelter-form">
                    <div class="form-group">
                        <label for="shelter-type">Shelter Type:</label>
                        <select id="shelter-type" required>
                            <option value="" disabled selected>Select type</option>
                            <option value="public_shelter">Public Shelter</option>
                            <option value="building_shelter">Building Shelter</option>
                            <option value="underground_parking">Underground Parking Lot</option>
                        </select>
                    </div>

                    <div class="form-group" id="floors-group" style="display: none;">
                        <label for="floors">Floors Underground:</label>
                        <input type="number" id="floors" min="1" placeholder="e.g. 2">
                    </div>

                    <button type="submit" class="secondary-btn">Add Current Location</button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Shelter - Secure Place Finder</title>
    <link rel="stylesheet" href="main.css?v=46">
    <meta name="theme-color" content="#d32f2f">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        #report-map {
            width: 100%;
            height: 300px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <button id="lang-toggle" class="icon-btn">🇺🇸 / 🇮🇱</button>
                <a href="index.html" class="icon-btn">🏠</a>
            </div>
            <h1 data-i18n="report_page_title">Report a New Shelter</h1>
            <p data-i18n="report_subtitle">Help others by adding a safe zone location.</p>
        </header>

        <main>
            <div id="status-message" class="status"></div>

            <div class="add-shelter-section" style="border-top: none; margin-top: 0;">
                <form id="add-shelter-form">
                    <div class="form-group">
                        <label data-i18n="location_method_label">Location Method:</label>
                        <div style="margin-top: 5px; margin-bottom: 15px;">
                            <label style="display: inline-flex; align-items: center; margin-right: 15px; cursor: pointer;">
                                <input type="radio" name="location-method" value="current" checked style="width: auto; margin-right: 5px;">
                                <span data-i18n="method_current">Current Location</span>
                            </label>
                            <label style="display: inline-flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="location-method" value="manual" style="width: auto; margin-right: 5px;">
                                <span data-i18n="method_manual">Select on Map</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group" id="map-group" style="display: none;">
                        <label data-i18n="location_label">Location:</label>
                        <div id="report-map"></div>
                        <p id="location-status" style="font-size: 0.9rem; color: #666; margin-top: -15px; margin-bottom: 15px;"></p>
                    </div>

                    <div class="form-group">
                        <label for="shelter-type" data-i18n="shelter_type_label">Shelter Type:</label>
                        <select id="shelter-type" required>
                            <option value="" disabled selected data-i18n="select_type">Select Type</option>
                            <option value="public_shelter" data-i18n="type_public">Public Shelter</option>
                            <option value="building_shelter" data-i18n="type_building">Building Shelter</option>
                            <option value="portable_shelter" data-i18n="type_portable" id="option-portable">Portable Shelter</option>
                            <option value="underground_parking" data-i18n="type_parking">Underground Parking Lot</option>
                        </select>
                    </div>

                    <div class="form-group" id="floors-group" style="display: none;">
                        <label for="floors" data-i18n="floors_label">Floors Underground:</label>
                        <input type="number" id="floors" min="1" placeholder="e.g. -2">
                    </div>

                    <div class="form-group">
                        <label for="shelter-description" data-i18n="description_label">Description (Optional):</label>
                        <textarea id="shelter-description" maxlength="1000" rows="5" placeholder="Describe the location, how to get there, etc." data-i18n-placeholder="description_placeholder_long"></textarea>
                    </div>
                    
                    <button type="submit" class="secondary-btn" style="background-color: #d32f2f; margin-top: 20px;">
                        📍 <span data-i18n="report_btn">Report Current Location</span>
                    </button>
                    
                    <button type="button" id="cancel-btn" class="secondary-btn" style="background-color: #757575; margin-top: 10px;">
                        <span data-i18n="cancel_btn">Cancel</span>
                    </button>
                </form>
            </div>
            <footer style="margin-top: 30px; color: #999; font-size: 0.8rem; text-align: center;">
                <p>Version 51.0</p>
            </footer>
        </main>
    </div>
    <script src="report.v51.js"></script>
</body>
</html>
